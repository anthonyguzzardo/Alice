name: Signal Engine Reproducibility

on:
  pull_request:
    paths:
      - 'src-rs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/signal-reproducibility.yml'
  # Push to main: always run (no path filter) so the linux-x64 .node artifact
  # is available for deploy.sh on any commit, not just ones that touched
  # src-rs. The reproducibility job is path-filtered on PRs (saves CI minutes
  # when only TS changes), but the build-linux-x64 job below uploads the
  # deployable artifact every time.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS / aarch64 (dev target): clippy, unit tests, full reproducibility
  # check via two-clean-build snapshot diff. This is the locked-in bit-identity
  # guarantee for the dev-machine build artifact.
  check-darwin-arm64:
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: ~/.rustup/toolchains
          key: rustup-${{ hashFiles('src-rs/rust-toolchain.toml') }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('src-rs/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Install Rust toolchain
        run: rustup show

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Reproducibility check
        run: ./reproducibility-check.sh

  # Linux / x86_64 (production target on Hetzner CCX): build with
  # `-C target-cpu=x86-64-v3` so the binary takes identical code paths on
  # AMD EPYC Milan and Genoa. Without this flag, runtime CPU dispatch can
  # diverge across the Hetzner fleet's microarchitecture mix and break
  # bit-identity. This job validates the production build succeeds and
  # publishes the SHA-256 + .node artifact for traceability.
  build-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src-rs
    env:
      RUSTFLAGS: "-C target-cpu=x86-64-v3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: ~/.rustup/toolchains
          key: rustup-linux-${{ hashFiles('src-rs/rust-toolchain.toml') }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-linux-${{ hashFiles('src-rs/Cargo.lock') }}
          restore-keys: cargo-registry-linux-

      - name: Install Rust toolchain
        run: rustup show

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@3

      - name: Build linux-x64 .node (target-cpu=x86-64-v3)
        run: napi build --release --platform

      - name: Print binary SHA-256
        run: |
          BIN=$(ls *.linux-x64-gnu.node || ls *.linux-x64.node || true)
          if [ -z "$BIN" ]; then
            echo "::error::no .node binary produced"; exit 1
          fi
          echo "binary: $BIN"
          shasum -a 256 "$BIN"

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: alice-signals-linux-x64
          path: src-rs/*.linux-x64*.node
          if-no-files-found: error
          # 90-day retention so a deploy off a slightly older main commit can
          # still pull its matching binary.
          retention-days: 90
